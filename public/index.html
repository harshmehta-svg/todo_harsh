<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required="required">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required="required">
            </div>
            <div class="form-group button">
                <input type="button" id="login-button" value="Login">
            </div>
            <div class="form-group">
                <span>Not registered? <a data-toggle="modal" href="#register-modal">Sign up</a></span>
            </div>
            <div class="form-group">
                <span>Forgot password? <a data-toggle="modal" href="#recover-modal">Recover</a></span>
            </div>
        </form>
    </div>

    <!-- Modal for Register -->
    <div class="modal fade" id="register-modal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Sign Up</h2>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form class="register-form">
                        <div class="form-group">
                            <input type="email" id="reg-email" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="reg-password" placeholder="Password" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="reg-password-2" placeholder="Confirm Password" required>
                        </div>
                        <div class="form-group button">
                            <button type="submit">Sign Up</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Recover -->
    <div class="modal fade" id="recover-modal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Recover Password</h2>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form class="recover-form">
                        <div class="form-group">
                            <input type="email" id="rec-email" placeholder="Email" required>
                        </div>
                        <div class="form-group button">
                            <button type="submit">Recover Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
