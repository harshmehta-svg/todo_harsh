<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos</title>
    <style>
        body {
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
            "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
            sans-serif;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        
        code {
          font-family: source-code-pro, Menlo, Monaco, Consolas, "Courier New",
            monospace;
        }
        
        /* Adding CSS for Navbar component */
        .navbar {
            display: flex;
            align-items: center;
            background-color: #333;
            padding: 1rem;
            color: #fff;
        }
        
        .logo {
            font-size: 1.5rem;
            margin-right: 1rem;
        }
        
        .navLinks {
            margin-left: 2rem;
        }
        
        ul {
          list-style: none;
          padding: 0;
          margin: 0;
        }
        
        li {
          display: inline-block;
          margin-right: 1rem;
        }
        
        a {
          color: #fff;
          text-decoration: none;
        }
        
        a:hover {
          text-decoration: underline;
        }
        
        .profileDropdown {
            position: relative;
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        
        .dropdown {
            position: absolute;
            background-color: #333;
            border: 1px solid #333;
            padding: 1rem;
            right: 0;
            top: 100%;
        }
        
        .dropdown:hover {
          background-color: #555;
        }
        
        .dropdownMenu {
            display: none;
            position: absolute;
            background-color: #333;
            padding: 1rem;
            border: 1px solid #333;
            right: 0;
            top: 100%;
        }
        
        .dropdownMenu.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // New file
    </script>
</body>
</html>
