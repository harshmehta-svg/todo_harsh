<body>
  <!-- Your existing HTML content here -->
  <div class="container">
    <header>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="signup-section">
        <h1>Sign Up</h1>
        <form id="signup-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>
          <br><br>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
          <br><br>
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
          <br><br>
          <label for="confirm-password">Confirm Password:</label>
          <input type="password" id="confirm-password" name="confirm-password" required>
          <br><br>
          <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="#">Login</a></p>
      </section>
    </main>
    <script src="script1.js"></script>
    <script src="script2.js"></script>
  </div>

  <!-- New form for signup validation using JavaScript -->
  <script>
    // Example form validation using document.getElementById
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();

      // Get the values of the form elements
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Simple form validation
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      // If the form is valid, perform the requested action
      // For this example, we just alert the form data
      alert(`Username: ${username}\nEmail: ${email}\nPassword: ${password}`);
    });
  </script>

  <!-- New code for styling the signup section -->
  <style>
    .signup-section {
      width: 50%;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
    }

    .signup-section h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #signup-form {
      display: flex;
      flex-direction: column;
    }

    #signup-form label {
      margin-bottom: 10px;
    }

    #signup-form input {
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #signup-form button[type="submit"] {
      background-color: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #signup-form button[type="submit"]:hover {
      background-color: #3e8e41;
    }
  </style>
</body>
