<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toddle - Todo List App</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <h1>&#10145; Toddle &#10145;</h1>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/login">Login</a></li>
                <li><a href="/register">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="login-container">
            <form id="login-form">
                <h2>Login to Toddle</h2>
                <label for="email">Email</label>
                <input type="email" id="email" required>
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <button id="login-button">Login</button>
                <p id="error-message"></p>
                <p id="signup-link">Haven't got an account? <a href="/register">Register Here</a></p>
            </form>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
