<!-- This is the index.html file for the Todo App repository -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbx7W6XewBF7j6ZiDLRGafQBAb6HdWn6PSMY09MuCjqG6y8KNC/ZF0s9qjcvOq7il"
          crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="row" id="app">
        <h1 class="col-sm-12">Todo List</h1>
        <div class="col-sm-4">
            <input id="new-item" type="text" placeholder="Enter new task" class="form-control mb-4">
        </div>
        <button id="add-button" class="btn btn-primary mb-4">Add</button>
        <ul id="todo-list" class="list-group col-sm-8">
        </ul>
    </div>

    <!-- Vanilla JavaScript files -->
    <script src="vanilla.bundle.js"></script>

    <!-- React files -->
    <script src="src/index.bundle.js"></script>

</body>
</html>
