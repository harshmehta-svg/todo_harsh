<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <!-- Update the CSS file link -->
    <link rel="stylesheet" href="public/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/dist/react.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/dist/react-dom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.17.11/babel.min.js"></script>
    <style>
        .react-table {
            border-collapse: collapse;
            width: 100%;
        }
        .react-table th, .react-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .react-table th {
            background-color: #f0f0f0;
        }
        .pagination {
            padding: 10px;
            text-align: center;
        }
        .pagination a {
            color: #337ab7;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background-color: #f0f0f0;
        }
        .pagination a.active {
            background-color: #337ab7;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <div class="input-container">
            <input type="text" id="todo-input" placeholder="Enter a new todo">
            <button id="add-btn">Add Todo</button>
        </div>
        <div id="table-container"></div>
        <div class="pagination">
            <div id="pagination"></div>
        </div>
    </div>
    <script>
        function Table({ columns, data, onPageChange }) {
            const [currentPage, setCurrentPage] = React.useState(0);
            const [pageSize, setPageSize] = React.useState(10);

            const handlePageChange = (pageNumber) => {
                onPageChange(pageNumber);
                setCurrentPage(pageNumber);
            };

            const handlePageSizeChange = (newPageSize) => {
                setPageSize(newPageSize);
                onPageChange(0);
            };

            const start = currentPage * pageSize;
            const end = start + pageSize;
            const paginatedData = data.slice(start, end);

            return (
                <table className="react-table">
                    <thead>
                        <tr>
                            {columns.map((column, index) => (
                                <th key={index}>{column.Header}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {paginatedData.map((row, index) => (
                            <tr key={index}>
                                {columns.map((column, columnIndex) => (
                                    <td key={columnIndex}>{row[column.id]}</td>
                                ))}
                            </tr>
                        ))}
                    </tbody>
                </table>
            );
        }

        function Pagination({ pageNumber, onPageChange }) {
            const pages = Math.ceil(pageNumber.length / 10);

            return (
                <nav>
                    {Array(pages).fill(0).map((_, index) => (
                        <a
                            key={index}
                            className={pageNumber.indexOf(index) !== -1 ? 'active' : ''}
                            onClick={() => onPageChange(index)}
                        >
                            {index + 1}
                        </a>
                    ))}
                </nav>
            );
        }

        function App() {
            const [data, setData] = React.useState([
                { id: 1, name: 'Todo 1', completed: false },
                { id: 2, name: 'Todo 2', completed: false },
                { id: 3, name: 'Todo 3', completed: false },
                // Add more todos here
            ]);

            let pageNumber = Array(Math.ceil(data.length / 10)).fill(0).map((_, index) => index).filter((index) => data.slice(index * 10, index * 10 + 10).length > 0);

            const handleAddTodo = () => {
                setData([...data, { id: data.length + 1, name: `Todo ${data.length + 1}`, completed: false }]);
            };

            const handleSort = (sortColumn, order) => {
                if (sortColumn.id === 'completed') {
                    const newTodos = [];

                    if (order === 'asc') {
                        newTodos.push(...data.filter((todo) => todo[sortColumn.id]));
                        newTodos.push(...data.filter((todo) => !todo[sortColumn.id]));
                    } else {
                        newTodos.push(...data.filter((todo) => !todo[sortColumn.id]));
                        newTodos.push(...data.filter((todo) => todo[sortColumn.id]));
                    }

                    setData(newTodos);
                } else {
                    const sortedData = [...data].sort((a, b) => {
                        if (a[sortColumn.id] < b[sortColumn.id]) return -1;
                        if (a[sortColumn.id] > b[sortColumn.id]) return 1;
                        return 0;
                    });

                    if (order === 'asc') {
                        setData(sortedData);
                    } else {
                        setData(sortedData.reverse());
                    }
                }
            };

            return (
                <div>
                    <button onClick={handleAddTodo}>Add Todo</button>
                    <Table
                        columns={[
                            { Header: 'ID', id: 'id', sort: handleSort },
                            { Header: 'Todo', id: 'name', sort: handleSort },
                            { Header: 'Completed', id: 'completed', sort: handleSort },
                        ]}
                        data={data}
                        onPageChange={(pageNumber) => {
                            pageNumber = Array(Math.ceil(data.length / 10)).fill(0).map((_, index) => index).filter((index) => data.slice(index * 10, index * 10 + 10).length > 0);
                            setData(pageNumber.indexOf(pageNumber) >= 0 ? data.slice(pageNumber, pageNumber + 10) : data);
                        }}
                    />
                    <Pagination pageNumber={pageNumber} onPageChange={(pageNumber) => {
                        pageNumber = Array(Math.ceil(data.length / 10)).fill(0).map((_, index) => index).filter((index) => data.slice(index * 10, index * 10 + 10).length > 0);
                        setData(pageNumber.indexOf(pageNumber) >= 0 ? data.slice(pageNumber * 10, pageNumber * 10 + 10) : data);
                    }} />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('table-container'));
    </script>
    <script src="public/app.js"></script>
    <script>
        // scan the project folder and remove unnecessary duplicate files at the root level
        const fs = require('fs');
        const path = require('path');

        const filePaths = fs.readdirSync('.');
        filePaths.forEach(filePath => {
            const filePathAbsolute = path.join('.', filePath);
            if (filePath === 'index.html' || filePath === 'index.css' || filePath === 'app.js') {
                const filePathInPublic = path.join('public', filePath);
                require('fs').renameSync(filePathAbsolute, filePathInPublic);
            }
        });
    </script>
</body>
</html>
