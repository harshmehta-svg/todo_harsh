<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Add package.json file metadata to the <head> section for SEO and metadata -->
    <meta name="keywords" content="todo list, todo app, todo app demo">
    <meta name="description" content="Simple, clean, and intuitive Todo List application built entirely with front-end technologies">
    <meta name="author" content="Your Name">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="package" content="webpackage">
    <link rel="preload" href="package.json" as="fetch">
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <div class="input-container">
            <input type="text" id="todo-input" placeholder="Enter a new todo">
            <button id="add-btn">Add Todo</button>
        </div>
        <ul id="todo-list"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
